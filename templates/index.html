        // ========== HELPERS ==========
        function getStatusColor(status) {
            return COLORS[(status || 'unknown').toLowerCase()] || COLORS.unknown;
        }

        function getStatusColorHex(status) {
            const colors = {
                up: '#00ff88', online: '#00ff88', running: '#00ff88',
                down: '#888888', offline: '#888888', off: '#888888', stopped: '#888888', idle: '#888888',
                working: '#ff00ff', busy: '#ff00ff',
                error: '#ff4444', failed: '#ff4444'
            };
            return colors[(status || 'unknown').toLowerCase()] || '#555555';
        }

        // Compute aggregated status for an area based on its skills
        // Priority: working > up/running > off/stopped
        function getAggregatedAreaStatus(areaId) {
            const areaData = meshes.areas[areaId];
            if (!areaData || !areaData.skillStatuses) return 'off';

            const statuses = Object.values(areaData.skillStatuses);
            if (statuses.length === 0) return 'off';

            // Check for working first (highest priority)
            if (statuses.some(s => s === 'working' || s === 'busy')) {
                return 'working';
            }
            // Check for up/running
            if (statuses.some(s => s === 'up' || s === 'running' || s === 'online')) {
                return 'up';
            }
            // Default to off
            return 'off';
        }

        // Update area appearance based on aggregated status
        function updateAreaAppearance(areaId) {
            const areaData = meshes.areas[areaId];
            if (!areaData || !areaData.mesh) return;

            const status = getAggregatedAreaStatus(areaId);
            const baseColor = areaData.baseColor || AREA_COLORS[areaId] || AREA_COLORS.default;

            // Modulate color, opacity and emissive based on status
            const mat = areaData.mesh.material;
            const wireMat = areaData.wireframe ? areaData.wireframe.material : null;

            if (status === 'working') {
                mat.color = new THREE.Color(baseColor);
                mat.emissive = new THREE.Color(0xff00ff);
                mat.emissiveIntensity = 0.5;
                mat.opacity = 0.8;
                if (wireMat) {
                    wireMat.color = new THREE.Color(0xff00ff);
                    wireMat.opacity = 1.0;
                }
                // Add to pulsing
                if (!pulsingObjects.includes(areaData.mesh)) {
                    pulsingObjects.push(areaData.mesh);
                }
            } else if (status === 'up') {
                mat.color = new THREE.Color(baseColor);
                mat.emissive = new THREE.Color(baseColor);
                mat.emissiveIntensity = 0.3;
                mat.opacity = 0.7;
                if (wireMat) {
                    wireMat.color = new THREE.Color(baseColor);
                    wireMat.opacity = 0.8;
                }
                // Remove from pulsing
                const idx = pulsingObjects.indexOf(areaData.mesh);
                if (idx !== -1) {
                    pulsingObjects.splice(idx, 1);
                    areaData.mesh.scale.setScalar(1);
                }
            } else {
                // off - griser completement l'aire
                mat.color = new THREE.Color(0x333333);
                mat.emissive = new THREE.Color(0x111111);
                mat.emissiveIntensity = 0.02;
                mat.opacity = 0.2;
                if (wireMat) {
                    wireMat.color = new THREE.Color(0x444444);
                    wireMat.opacity = 0.3;
                }
                // Remove from pulsing
                const idx = pulsingObjects.indexOf(areaData.mesh);
                if (idx !== -1) {
                    pulsingObjects.splice(idx, 1);
                    areaData.mesh.scale.setScalar(1);
                }
            }

            // Debug log
            console.log(`Area ${areaId}: ${Object.keys(areaData.skillStatuses || {}).length} skills, status=${status}`);
        }

        function clearScene() {
            // Remove ALL objects except lights and camera
            const toRemove = [];
            scene.traverse((obj) => {
                if (obj.isMesh || obj.isLine || obj.isLineSegments || obj.isSprite || obj.isGroup) {
                    toRemove.push(obj);
                }
            });
            toRemove.forEach(obj => {
                scene.remove(obj);
                if (obj.geometry) obj.geometry.dispose();
                if (obj.material) {
                    if (Array.isArray(obj.material)) {
                        obj.material.forEach(m => m.dispose());
                    } else {
                        obj.material.dispose();
                    }
                }
            });

            // Clear tracking arrays
            meshes = { machines: {}, tubes: [], areas: {}, skills: {}, connections: [], labels: [], onyxCore: null };
            pulsingObjects = [];
        }

        function updateStats() {
            document.getElementById('stat-machines').textContent = (data.machines || []).length;
            document.getElementById('stat-online').textContent = (data.machines || []).filter(m => m.status === 'online').length;
            document.getElementById('stat-skills').textContent = data.stats?.total_skills || Object.keys(data.areas || {}).reduce((sum, k) => sum + (data.areas[k].skills || []).length, 0);
            document.getElementById('stat-areas').textContent = Object.keys(data.areas || {}).length;
        }

        function handleStatusUpdate(update) {
            // Update skill status in realtime
            const skillName = update.skill_name;
            const skillKey = update.host ? `${update.host}:${skillName}` : skillName;
            const brainArea = update.brain_area || 'external';

            // Try multiple keys to find the skill
            const keysToTry = [skillKey, skillName];
            let areaToUpdate = null;
            let machineToUpdate = null;
            let skillFound = false;

            for (const key of keysToTry) {
                if (meshes.skills[key]) {
                    skillFound = true;
                    const color = getStatusColor(update.status);
                    meshes.skills[key].mesh.material.color.setHex(color);
                    meshes.skills[key].mesh.material.emissive.setHex(color);

                    // Add/remove from pulsing if working
                    const idx = pulsingObjects.indexOf(meshes.skills[key].mesh);
                    if (update.status === 'working' || update.status === 'busy') {
                        if (idx === -1) pulsingObjects.push(meshes.skills[key].mesh);
                    } else {
                        if (idx !== -1) pulsingObjects.splice(idx, 1);
                        meshes.skills[key].mesh.scale.setScalar(1);
                    }

                    // Update area status tracking and propagate
                    const areaId = meshes.skills[key].areaId;
                    if (areaId && meshes.areas[areaId]) {
                        meshes.areas[areaId].skillStatuses[skillName] = update.status;
                        areaToUpdate = areaId;
                    }
                    break;
                }
            }

            // Si le skill n'a pas de mesh mais a une brain_area, mettre a jour l'aire quand meme
            // Cela gere les skills desktop (hbi-plate, etc) qui passent de off a working
            if (!skillFound && brainArea && meshes.areas[brainArea]) {
                meshes.areas[brainArea].skillStatuses[skillName] = update.status;
                areaToUpdate = brainArea;
                console.log(`Skill ${skillName} (no mesh) updated area ${brainArea} to ${update.status}`);
            }

            // Update parent area appearance if skill was found or area was updated
            if (areaToUpdate) {
                updateAreaAppearance(areaToUpdate);
            }

            // Also update in data for persistence and find machine to update
            if (update.host && data.machines) {
                const machine = data.machines.find(m => m.local_ip === update.host || m.hostname === update.host);
                if (machine) {
                    if (machine.skills) {
                        const skill = machine.skills.find(s => s.skill_name === skillName || s.name === skillName);
                        if (skill) skill.status = update.status;
                    }
                    // Update machine skill status cache
                    if (meshes.machines[machine.node_id]) {
                        meshes.machines[machine.node_id].skillStatuses[skillName] = update.status;
                        machineToUpdate = machine.node_id;
                    }
                }
            }

            // Pour les skills sur OnyxSoma (pas de host), mettre à jour OnyxSoma
            if (!update.host) {
                // Trouver OnyxSoma et mettre à jour son cache de skills
                for (const nodeId in meshes.machines) {
                    if (meshes.machines[nodeId].isSoma) {
                        meshes.machines[nodeId].skillStatuses[skillName] = update.status;
                        machineToUpdate = nodeId;
                        console.log(`[OnyxSoma] Updated ${skillName} to ${update.status}, aggregated:`, getAggregatedMachineStatus(nodeId));
                        break;
                    }
                }
            }

            // Update machine appearance
            if (machineToUpdate) {
                updateMachineAppearance(machineToUpdate);
                console.log(`[Machine] ${machineToUpdate} appearance updated, final status:`, getAggregatedMachineStatus(machineToUpdate));
            }
        }

        // ========== CAMERA ==========
        function resetCamera() {
            if (currentView === 'network') {
                camera.position.set(40, 30, 40);
            } else {
                camera.position.set(25, 20, 25);
            }
            camera.lookAt(0, 0, 0);
            controls.target.set(0, 0, 0);
        }

        function animateCameraTo(target, callback) {
            // Simple instant transition for now
            callback();
        }

        function toggleRotation() {
            autoRotate = !autoRotate;
            document.getElementById('btn-rotate').classList.toggle('active', autoRotate);
        }

        // ========== MONITORING SYSTEM - 5 Spheres Pulsantes ==========
        function toggleMonitoring() {
            monitoringEnabled = !monitoringEnabled;
            document.getElementById('btn-monitoring').classList.toggle('active', monitoringEnabled);

            // Afficher/masquer la legende des metriques
            const legendMetrics = document.getElementById('legend-metrics');
            if (legendMetrics) {
                legendMetrics.style.display = monitoringEnabled ? 'block' : 'none';
            }

            if (monitoringEnabled) {
                // Afficher les spheres de metriques
                showMetricSpheres();
                // Demarrer le polling des metriques
                startMonitoringPolling();
                console.log('[Brain3D] Monitoring enabled - Pulsing spheres active');
            } else {
                // Cacher les spheres de metriques
                hideMetricSpheres();
                // Arreter le polling
                stopMonitoringPolling();
                console.log('[Brain3D] Monitoring disabled');
            }
        }

        // Variable pour tracker la machine sélectionnée (métriques affichées)
        let selectedMachineNodeId = null;

        function showMetricsForMachine(nodeId) {
            // Cacher les métriques de l'ancienne machine
            if (selectedMachineNodeId && selectedMachineNodeId !== nodeId) {
                hideMetricsForMachine(selectedMachineNodeId);
            }

            selectedMachineNodeId = nodeId;
            const machineData = meshes.machines[nodeId];
            if (!machineData || !machineData.metricParticles) return;

            machineData.metricsVisible = true;
            for (const metricName in machineData.metricParticles) {
                machineData.metricParticles[metricName].visible = true;
            }

            // Démarrer le polling si pas déjà actif
            if (!monitoringInterval) {
                startMonitoringPolling();
            }

            console.log(`[Brain3D] Showing metrics for ${nodeId}`);
        }

        function hideMetricsForMachine(nodeId) {
            const machineData = meshes.machines[nodeId];
            if (!machineData || !machineData.metricParticles) return;

            machineData.metricsVisible = false;
            for (const metricName in machineData.metricParticles) {
                const particle = machineData.metricParticles[metricName];
                particle.visible = false;
                particle.scale.setScalar(1);  // Reset scale
            }
        }

        function hideAllMetrics() {
            for (const nodeId in meshes.machines) {
                hideMetricsForMachine(nodeId);
            }
            selectedMachineNodeId = null;
            stopMonitoringPolling();
        }

        // Anciennes fonctions pour compatibilité (bouton toggle global)
        function showMetricSpheres() {
            for (const nodeId in meshes.machines) {
                showMetricsForMachine(nodeId);
            }
        }

        function hideMetricSpheres() {
            hideAllMetrics();
        }

        function startMonitoringPolling() {
            if (monitoringInterval) clearInterval(monitoringInterval);
            // Premiere requete immediatement
            fetchMetrics();
            // Puis toutes les X secondes
            monitoringInterval = setInterval(fetchMetrics, MONITORING_REFRESH_MS);
        }

        function stopMonitoringPolling() {
            if (monitoringInterval) {
                clearInterval(monitoringInterval);
                monitoringInterval = null;
            }
        }

        async function fetchMetrics() {
            try {
                const response = await fetch('/api/metrics');
                if (response.ok) {
                    const metricsData = await response.json();
                    updateAllMetrics(metricsData);
                }
            } catch (e) {
                console.error('[Brain3D] Failed to fetch metrics:', e);
            }
        }

        function updateAllMetrics(metricsData) {
            // metricsData = { "node_id": { cpu: 45, ram: 67, gpu: 0, disk: 23 }, ... }
            for (const nodeId in metricsData) {
                const metrics = metricsData[nodeId];
                updateMachineMetrics(nodeId, metrics);
            }
        }

        function updateMachineMetrics(nodeId, metrics) {
            const machineData = meshes.machines[nodeId];
            if (!machineData) return;

            // Stocker les metriques (5 parametres)
            machineData.metrics = {
                cpu: Math.min(100, Math.max(0, metrics.cpu || 0)),
                gpu: Math.min(100, Math.max(0, metrics.gpu || 0)),
                ram: Math.min(100, Math.max(0, metrics.ram || 0)),
                disk: Math.min(100, Math.max(0, metrics.disk || 0)),
                net: Math.min(100, Math.max(0, metrics.net || 0))
            };

            // Mettre a jour les valeurs dans les particules
            if (machineData.metricParticles) {
                for (const metricName in machineData.metrics) {
                    const particle = machineData.metricParticles[metricName];
                    if (particle) {
                        particle.userData.value = machineData.metrics[metricName];
                    }
                }
            }
        }

        // Animation fluide des particules orbitales
        function animateMetricParticles() {
            for (const nodeId in meshes.machines) {
                const machineData = meshes.machines[nodeId];
                if (!machineData || !machineData.metricParticles || !machineData.metricsVisible) continue;

                for (const metricName in machineData.metricParticles) {
                    const particle = machineData.metricParticles[metricName];
                    if (!particle.visible) continue;

                    const value = particle.userData.value || 0;
                    const order = particle.userData.order || 0;
                    const orbitRadius = particle.userData.orbitRadius;
                    const baseSize = particle.userData.baseSize;

                    // Vitesse orbitale proportionnelle à la charge (plus de charge = plus rapide)
                    const baseSpeed = 0.3 + (value / 100) * 1.5;  // 0.3 à 1.8 rad/s
                    particle.userData.angle += baseSpeed * 0.016;

                    // Position sur l'orbite
                    const angle = particle.userData.angle;
                    const yOffset = (order - 2) * (machineData.isSoma ? 2 : 1.2);  // Décalage en Y
                    particle.position.set(
                        Math.cos(angle) * orbitRadius,
                        yOffset + Math.sin(angle * 2) * 0.5,  // Légère oscillation en Y
                        Math.sin(angle) * orbitRadius
                    );

                    // Taille proportionnelle à la charge (plus de charge = plus gros)
                    const sizeMultiplier = 0.5 + (value / 100) * 1.5;  // 0.5x à 2x
                    particle.scale.setScalar(sizeMultiplier);

                    // Pulsation subtile
                    const pulseSpeed = 2 + (value / 100) * 3;
                    const pulseAmplitude = 0.1 + (value / 100) * 0.15;
                    const pulse = 1 + Math.sin(animationTime * pulseSpeed + order) * pulseAmplitude;
                    particle.scale.multiplyScalar(pulse);

                    // Opacité et émission selon charge
                    particle.material.opacity = 0.6 + (value / 100) * 0.35;
                    particle.material.emissiveIntensity = 0.3 + (value / 100) * 0.5;
                }
            }
        }

        // Alias pour compatibilité
        function animateMetricSpheres() {
            animateMetricParticles();
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ========== ANIMATION ==========
        function animate() {
            requestAnimationFrame(animate);
            animationTime += 0.016;

            controls.autoRotate = autoRotate;
            controls.autoRotateSpeed = 0.5;
            controls.update();

            // Pulse working objects (subtle breathing effect)
            const pulse = 1 + Math.sin(animationTime * 2) * 0.08;
            pulsingObjects.forEach(obj => {
                obj.scale.setScalar(pulse);
            });

            // Animate OnyxCore polymorphic shape
            if (meshes.onyxCore) {
                const { group, core, outer } = meshes.onyxCore;

                // Rotation lente du groupe
                group.rotation.y += 0.002;
                group.rotation.x = Math.sin(animationTime * 0.3) * 0.1;

                // Morphing du noyau - déformation douce des vertices
                if (core.geometry.userData.originalPositions) {
                    const positions = core.geometry.attributes.position.array;
                    const original = core.geometry.userData.originalPositions;
                    const time = animationTime * 0.5;

                    for (let i = 0; i < positions.length; i += 3) {
                        const ox = original[i], oy = original[i+1], oz = original[i+2];
                        const dist = Math.sqrt(ox*ox + oy*oy + oz*oz);
                        const noise = Math.sin(ox * 2 + time) * Math.cos(oy * 2 + time * 1.3) * Math.sin(oz * 2 + time * 0.7);
                        const morph = 1 + noise * 0.12;
                        positions[i] = ox * morph;
                        positions[i+1] = oy * morph;
                        positions[i+2] = oz * morph;
                    }
                    core.geometry.attributes.position.needsUpdate = true;
                    core.geometry.computeVertexNormals();
                }

                // Pulsation de la couche externe
                outer.scale.setScalar(1 + Math.sin(animationTime * 1.5) * 0.05);
                outer.rotation.y -= 0.003;

                // Animation des particules orbitales
                group.children.forEach(child => {
                    if (child.userData.orbitRadius) {
                        const { orbitRadius, orbitSpeed, orbitPhase, orbitTilt } = child.userData;
                        const angle = animationTime * orbitSpeed + orbitPhase;
                        child.position.x = Math.cos(angle) * orbitRadius;
                        child.position.y = Math.sin(angle * 2) * orbitTilt * 2;
                        child.position.z = Math.sin(angle) * orbitRadius;
                    }
                });
            }

            // Animate tube particles
            meshes.tubes.forEach(tube => {
                tube.children.forEach(child => {
                    if (child.userData.curve) {
                        child.userData.progress = (child.userData.progress + 0.005) % 1;
                        const pos = child.userData.curve.getPoint(child.userData.progress);
                        child.position.copy(pos).sub(tube.position);
                    }
                });
            });

            // Animer les spheres de metriques (pulsation)
            animateMetricSpheres();

            renderer.render(scene, camera);
        }

        // ========== START ==========
        init();
    </script>
</body>
</html>
