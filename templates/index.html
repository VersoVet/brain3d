<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain3D - Onyx Network Visualizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
        }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

        #breadcrumb {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 20, 0.9);
            border: 1px solid #00d4aa;
            border-radius: 20px;
            padding: 10px 25px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #breadcrumb .crumb {
            color: #888;
            cursor: pointer;
            transition: color 0.2s;
        }
        #breadcrumb .crumb:hover { color: #00d4aa; }
        #breadcrumb .crumb.active { color: #00d4aa; font-weight: bold; }
        #breadcrumb .separator { color: #444; }

        #info-panel {
            position: fixed;
            top: 80px;
            left: 20px;
            background: rgba(10, 10, 20, 0.9);
            border: 1px solid #00d4aa;
            border-radius: 8px;
            padding: 15px;
            min-width: 280px;
            max-width: 350px;
            z-index: 100;
        }
        #info-panel h2 {
            color: #00d4aa;
            font-size: 1.1em;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.9em;
        }
        .stat-label { color: #888; }
        .stat-value { color: #00d4aa; }

        #detail-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            background: rgba(10, 10, 20, 0.95);
            border: 1px solid #00d4aa;
            border-radius: 8px;
            padding: 20px;
            min-width: 320px;
            max-width: 400px;
            max-height: 70vh;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }
        #detail-panel.visible { display: block; }
        #detail-panel h3 { color: #00d4aa; margin-bottom: 15px; }
        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
        }
        .close-btn:hover { color: #fff; }

        .skill-list { margin-top: 10px; }
        .skill-item {
            display: flex;
            align-items: center;
            padding: 8px;
            margin: 4px 0;
            background: rgba(0, 212, 170, 0.1);
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .skill-item:hover { background: rgba(0, 212, 170, 0.2); }
        .skill-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 10px;
        }

        #legend {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(10, 10, 20, 0.9);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            z-index: 100;
        }
        #legend h4 { color: #888; margin-bottom: 8px; font-size: 0.85em; }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 4px 0;
            font-size: 0.8em;
        }
        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .legend-color.pulsing { animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
        }

        #controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(10, 10, 20, 0.9);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            z-index: 100;
        }
        #controls button {
            background: #1a1a2e;
            border: 1px solid #00d4aa;
            color: #00d4aa;
            padding: 8px 15px;
            margin: 3px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #controls button:hover, #controls button.active {
            background: #00d4aa;
            color: #0a0a0f;
        }

        #connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 6px 15px;
            border-radius: 15px;
            font-size: 0.8em;
            z-index: 100;
        }
        #connection-status.connected {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
            color: #00ff88;
        }
        #connection-status.disconnected {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            color: #ff4444;
        }

        #click-hint {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 212, 170, 0.2);
            border: 1px solid #00d4aa;
            border-radius: 20px;
            padding: 8px 20px;
            font-size: 0.85em;
            color: #00d4aa;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #click-hint.visible { opacity: 1; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="connection-status" class="disconnected">Connecting...</div>

    <div id="breadcrumb">
        <span class="crumb active" data-view="network">🌐 Network</span>
    </div>

    <div id="info-panel">
        <h2>Onyx Network</h2>
        <div class="stat-row">
            <span class="stat-label">Machines</span>
            <span class="stat-value" id="stat-machines">0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Online</span>
            <span class="stat-value" id="stat-online">0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Skills Total</span>
            <span class="stat-value" id="stat-skills">0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Aires</span>
            <span class="stat-value" id="stat-areas">0</span>
        </div>
    </div>

    <div id="detail-panel">
        <button class="close-btn" onclick="closeDetail()">&times;</button>
        <h3 id="detail-title">Details</h3>
        <div id="detail-content"></div>
    </div>

    <div id="legend">
        <h4>Status</h4>
        <div class="legend-item"><div class="legend-color" style="background: #00ff88;"></div>Online / Up</div>
        <div class="legend-item"><div class="legend-color" style="background: #888888;"></div>Offline / Down</div>
        <div class="legend-item"><div class="legend-color pulsing" style="background: #ff00ff;"></div>Working</div>
        <div class="legend-item"><div class="legend-color" style="background: #ff4444;"></div>Error</div>
        <div id="legend-metrics" style="display:none; margin-top: 12px; border-top: 1px solid #333; padding-top: 8px;">
            <h4>Metrics</h4>
            <div class="legend-item"><div class="legend-color" style="background: #00ff88;"></div>CPU</div>
            <div class="legend-item"><div class="legend-color" style="background: #00aaff;"></div>RAM</div>
            <div class="legend-item"><div class="legend-color" style="background: #ff00ff;"></div>GPU</div>
            <div class="legend-item"><div class="legend-color" style="background: #ffaa00;"></div>Disk</div>
        </div>
    </div>

    <div id="controls">
        <button id="btn-back" onclick="goBack()" style="display:none;">← Back</button>
        <button id="btn-reset" onclick="resetCamera()">Reset View</button>
        <button id="btn-rotate" onclick="toggleRotation()">Auto-Rotate</button>
        <button id="btn-monitoring" onclick="toggleMonitoring()">📊 Monitoring</button>
    </div>

    <div id="click-hint">Click on a machine to explore inside</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // ========== CONFIGURATION ==========
        const COLORS = {
            up: 0x00ff88, online: 0x00ff88, running: 0x00ff88,
            down: 0x888888, offline: 0x888888, off: 0x888888, stopped: 0x888888, idle: 0x888888,
            working: 0xff00ff, busy: 0xff00ff,
            error: 0xff4444, failed: 0xff4444,
            unknown: 0x555555,
            onyxcore: 0x00d4aa,
            onyxheart: 0xff6b35,
            networkdevice: 0x4488ff,  // Bleu pour machines sans OnyxHeart
            area: 0x4488ff,
            tube: 0x00d4aa,
            background: 0x0a0a0f,
            grid: 0x1a1a2e
        };

        // Couleurs pour les metriques systeme (monitoring)
        const METRIC_COLORS = {
            cpu: 0x00ff88,    // Vert - processeur
            ram: 0x00aaff,    // Bleu - memoire
            gpu: 0xff00ff,    // Magenta - GPU
            disk: 0xffaa00    // Orange - disque
        };

        // Positions des spheres de metriques dans le cube (relatif au centre)
        const METRIC_POSITIONS = {
            cpu:  { x: -1.5, y: 1.5, z: 0 },
            ram:  { x: 1.5, y: 1.5, z: 0 },
            gpu:  { x: -1.5, y: -1.5, z: 0 },
            disk: { x: 1.5, y: -1.5, z: 0 }
        };

        // Etat du monitoring (desactive par defaut)
        let monitoringEnabled = false;
        let monitoringInterval = null;
        const MONITORING_REFRESH_MS = 2000;  // Rafraichissement toutes les 2 secondes

        // Couleur uniforme pour toutes les aires cerebrales (cyan/turquoise)
        const AREA_DEFAULT_COLOR = 0x00d4aa;
        const AREA_COLORS = {
            'frontal': AREA_DEFAULT_COLOR, 'prefrontal': AREA_DEFAULT_COLOR,
            'temporal': AREA_DEFAULT_COLOR, 'parietal': AREA_DEFAULT_COLOR,
            'occipital': AREA_DEFAULT_COLOR, 'cerebellum': AREA_DEFAULT_COLOR,
            'limbic': AREA_DEFAULT_COLOR, 'brainstem': AREA_DEFAULT_COLOR,
            'hippocampus': AREA_DEFAULT_COLOR, 'amygdala': AREA_DEFAULT_COLOR,
            'thalamus': AREA_DEFAULT_COLOR, 'hypothalamus': AREA_DEFAULT_COLOR,
            'external': 0x636e72, 'default': AREA_DEFAULT_COLOR
        };

        // Icones par type de machine
        const DEVICE_ICONS = {
            // Par device_type
            'nas': '💾',
            'server': '🖥️',
            'hpc': '⚡',
            'network': '🌐',
            'router': '🌐',
            'firewall': '🛡️',
            'switch': '🔀',
            'windows': '🪟',
            'linux': '🐧',
            'android': '🤖',
            'ios': '📱',
            'phone': '📱',
            'tablet': '📱',
            'printer': '🖨️',
            'camera': '📷',
            'iot': '📡',
            'raspberry': '🍓',
            'onyxheart': '🧡',
            // Par OS (fallback)
            'truenas': '💾',
            'pfsense': '🛡️',
            'debian': '🐧',
            'ubuntu': '🐧',
            'rocky': '🐧',
            'centos': '🐧',
            'macos': '🍎',
            'default': '💻'
        };

        // Fonction pour obtenir l'icone d'une machine
        function getDeviceIcon(machine) {
            const deviceType = (machine.device_type || '').toLowerCase();
            const platform = (machine.platform || machine.os || '').toLowerCase();
            const hostname = (machine.hostname || '').toLowerCase();

            // OnyxHeart a sa propre icone
            if (machine.has_onyxheart) return DEVICE_ICONS.onyxheart;

            // Chercher par device_type
            if (DEVICE_ICONS[deviceType]) return DEVICE_ICONS[deviceType];

            // Chercher par mots-cles dans platform/OS
            for (const [key, icon] of Object.entries(DEVICE_ICONS)) {
                if (platform.includes(key)) return icon;
            }

            // Detecter Windows
            if (platform.includes('windows') || platform.includes('win')) return DEVICE_ICONS.windows;

            // Detecter par hostname
            if (hostname.includes('phone') || hostname.includes('mobile')) return DEVICE_ICONS.phone;
            if (hostname.includes('print')) return DEVICE_ICONS.printer;
            if (hostname.includes('cam')) return DEVICE_ICONS.camera;

            return DEVICE_ICONS.default;
        }

        // ========== STATE ==========
        let scene, camera, renderer, controls;
        let currentView = 'network';
        let currentMachine = null;
        let viewStack = ['network'];

        let data = {
            machines: [],
            areas: {},
            skills: [],
            connections: []
        };

        let meshes = {
            machines: {},
            tubes: [],
            areas: {},
            skills: {},
            connections: [],
            labels: []
        };

        let ws = null;
        let autoRotate = false;
        let animationTime = 0;
        let pulsingObjects = [];
        let hoverObject = null;

        // ========== INIT ==========
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(COLORS.background);
            scene.fog = new THREE.FogExp2(COLORS.background, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(40, 30, 40);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 10;
            controls.maxDistance = 150;

            // Lights
            scene.add(new THREE.AmbientLight(0x404040, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(30, 50, 30);
            scene.add(dirLight);
            const pointLight = new THREE.PointLight(0x00d4aa, 0.4, 100);
            pointLight.position.set(0, 20, 0);
            scene.add(pointLight);

            // Grid
            const grid = new THREE.GridHelper(200, 100, COLORS.grid, COLORS.grid);
            grid.position.y = -10;
            grid.material.opacity = 0.3;
            grid.material.transparent = true;
            scene.add(grid);

            // Events
            window.addEventListener('resize', onResize);
            renderer.domElement.addEventListener('click', onClick);
            renderer.domElement.addEventListener('touchend', onTouchEnd, { passive: false });
            renderer.domElement.addEventListener('mousemove', onMouseMove);

            // Connect and start
            connectWebSocket();
            animate();

            // Show hint
            setTimeout(() => document.getElementById('click-hint').classList.add('visible'), 2000);
        }

        // ========== WEBSOCKET ==========
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onopen = () => {
                document.getElementById('connection-status').className = 'connected';
                document.getElementById('connection-status').textContent = 'Connected';
            };

            ws.onclose = () => {
                document.getElementById('connection-status').className = 'disconnected';
                document.getElementById('connection-status').textContent = 'Reconnecting...';
                setTimeout(connectWebSocket, 3000);
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'init' || msg.type === 'refresh') {
                    data = msg.data;
                    buildCurrentView();
                    updateStats();
                } else if (msg.type === 'status_update') {
                    handleStatusUpdate(msg.data);
                } else if (msg.type === 'metrics_update') {
                    // Mise a jour des metriques en temps reel via WebSocket
                    if (monitoringEnabled && msg.node_id && msg.metrics) {
                        updateMachineMetrics(msg.node_id, msg.metrics);
                    }
                }
            };
        }

        // ========== VIEW BUILDING ==========
        function buildCurrentView() {
            clearScene();

            if (currentView === 'network') {
                buildNetworkView();
            } else if (currentView === 'machine') {
                buildMachineView(currentMachine);
            }

            updateBreadcrumb();
        }

        function buildNetworkView() {
            const machines = data.machines || [];

            // Separer machines OnyxHeart et devices reseau
            const onyxheartMachines = machines.filter(m => m.has_onyxheart !== false);
            const networkDevices = machines.filter(m => m.has_onyxheart === false);

            // Find OnyxSoma (central)
            const somaIndex = onyxheartMachines.findIndex(m => m.hostname === 'OnyxSoma' || m.local_ip === '10.0.0.11');

            // Placer les machines OnyxHeart en cercle proche (rayon 25)
            onyxheartMachines.forEach((machine, idx) => {
                const isSoma = idx === somaIndex;
                let x, y, z;

                if (isSoma) {
                    x = 0; y = 0; z = 0;
                } else {
                    const otherIdx = idx > somaIndex ? idx - 1 : idx;
                    const otherCount = onyxheartMachines.length - 1;
                    const angle = (otherIdx / Math.max(otherCount, 1)) * Math.PI * 2;
                    const radius = 25;
                    x = Math.cos(angle) * radius;
                    z = Math.sin(angle) * radius;
                    y = 0;
                }

                createMachineCube(machine, x, y, z, isSoma);

                // Tube connection to Soma
                if (!isSoma && somaIndex >= 0) {
                    createTube(new THREE.Vector3(x, y, z), new THREE.Vector3(0, 0, 0), machine);
                }
            });

            // Placer les devices reseau (sans OnyxHeart) en cercle exterieur (rayon 45)
            networkDevices.forEach((device, idx) => {
                const angle = (idx / Math.max(networkDevices.length, 1)) * Math.PI * 2;
                const radius = 45;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                const y = -3; // Legèrement plus bas

                createNetworkDevice(device, x, y, z);

                // Ligne de connexion vers Soma (plus fine)
                createNetworkConnection(new THREE.Vector3(x, y, z), new THREE.Vector3(0, 0, 0), device);
            });

            document.getElementById('btn-back').style.display = 'none';
            document.getElementById('click-hint').classList.add('visible');

            console.log(`Network view: ${onyxheartMachines.length} OnyxHeart, ${networkDevices.length} network devices`);
        }

        // Creer une petite sphere bleue pour les devices reseau sans OnyxHeart
        function createNetworkDevice(device, x, y, z) {
            const size = 3; // Plus petit que les machines OnyxHeart
            const geometry = new THREE.SphereGeometry(size, 16, 16);

            const baseColor = COLORS.networkdevice;
            const material = new THREE.MeshPhongMaterial({
                color: baseColor,
                transparent: true,
                opacity: 0.5,
                emissive: baseColor,
                emissiveIntensity: 0.2
            });

            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, y, z);
            mesh.userData = { type: 'network-device', data: device, hasOnyxHeart: false };
            scene.add(mesh);

            // Wireframe
            const edges = new THREE.EdgesGeometry(geometry);
            const edgeMat = new THREE.LineBasicMaterial({ color: baseColor, transparent: true, opacity: 0.7 });
            const wireframe = new THREE.LineSegments(edges, edgeMat);
            mesh.add(wireframe);

            // Label avec icone
            const icon = getDeviceIcon(device);
            createLabel(device.hostname || device.node_id, mesh, size + 1.5, icon);

            // Stocker
            meshes.machines[device.node_id] = {
                mesh,
                wireframe,
                glow: null,
                machine: device,
                isSoma: false,
                baseColor,
                hasOnyxHeart: false,
                skillStatuses: {}
            };
        }

        // Ligne fine pour connexion devices reseau
        function createNetworkConnection(from, to, device) {
            const points = [from, to];
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineDashedMaterial({
                color: COLORS.networkdevice,
                transparent: true,
                opacity: 0.3,
                dashSize: 2,
                gapSize: 1
            });
            const line = new THREE.Line(geometry, material);
            line.computeLineDistances();
            scene.add(line);
            meshes.connections.push(line);
        }

        function createMachineCube(machine, x, y, z, isSoma) {
            const size = isSoma ? 12 : 8;
            const geometry = isSoma
                ? new THREE.DodecahedronGeometry(size * 0.6)
                : new THREE.BoxGeometry(size, size, size);

            const baseColor = isSoma ? COLORS.onyxcore : COLORS.onyxheart;
            const material = new THREE.MeshPhongMaterial({
                color: baseColor,
                transparent: true,
                opacity: 0.4,
                side: THREE.DoubleSide
            });

            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, y, z);
            mesh.userData = { type: 'machine', data: machine, isSoma };
            scene.add(mesh);

            // Edges
            const edges = new THREE.EdgesGeometry(geometry);
            const edgeMat = new THREE.LineBasicMaterial({
                color: baseColor,
                linewidth: 2
            });
            const wireframe = new THREE.LineSegments(edges, edgeMat);
            mesh.add(wireframe);

            // Inner glow sphere
            const glowGeo = new THREE.SphereGeometry(size * 0.2, 32, 32);
            const glowMat = new THREE.MeshBasicMaterial({
                color: baseColor,
                transparent: true,
                opacity: 0.8
            });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            mesh.add(glow);

            // Label avec icone
            const icon = getDeviceIcon(machine);
            createLabel(machine.hostname || machine.node_id, mesh, size * 0.8, icon);

            // Creer les spheres de metriques (cachees par defaut)
            const metricSpheres = {};
            const metricSize = size * 0.12;  // Petites spheres

            for (const [metricName, color] of Object.entries(METRIC_COLORS)) {
                const pos = METRIC_POSITIONS[metricName];
                const sphereGeo = new THREE.SphereGeometry(metricSize, 16, 16);
                const sphereMat = new THREE.MeshBasicMaterial({
                    color: color,
                    transparent: true,
                    opacity: 0.9
                });
                const sphere = new THREE.Mesh(sphereGeo, sphereMat);
                sphere.position.set(pos.x, pos.y, pos.z);
                sphere.visible = false;  // Cache par defaut
                sphere.userData = {
                    type: 'metric',
                    metric: metricName,
                    baseScale: 1.0,
                    pulsePhase: Math.random() * Math.PI * 2,  // Phase aleatoire pour desynchroniser
                    value: 0  // Valeur de charge 0-100
                };
                mesh.add(sphere);
                metricSpheres[metricName] = sphere;
            }

            // Stocker avec infos pour updates
            meshes.machines[machine.node_id] = {
                mesh,
                wireframe,
                glow,
                machine,
                isSoma,
                baseColor,
                skillStatuses: {},
                metricSpheres  // Ajouter les spheres de metriques
            };

            // Calculer le status initial basé sur les skills
            updateMachineAppearance(machine.node_id);
        }

        // Calculer le status agrégé d'une machine basé sur ses skills
        function getAggregatedMachineStatus(nodeId) {
            const machineData = meshes.machines[nodeId];
            if (!machineData) return 'offline';

            const machine = machineData.machine;
            const isSoma = machineData.isSoma;

            // Pour OnyxSoma, checker toutes les aires (directement depuis data.areas)
            if (isSoma) {
                const areas = data.areas || {};
                let hasWorking = false;
                let hasUp = false;

                for (const areaId in areas) {
                    const area = areas[areaId];
                    const skills = area.skills || [];

                    // Si meshes.areas existe (vue intérieure), utiliser getAggregatedAreaStatus
                    if (meshes.areas[areaId]) {
                        const areaStatus = getAggregatedAreaStatus(areaId);
                        if (areaStatus === 'working') hasWorking = true;
                        if (areaStatus === 'up') hasUp = true;
                    } else {
                        // Sinon, calculer directement depuis les données
                        for (const skill of skills) {
                            const status = skill.live_status || getSkillStatus(skill);
                            if (status === 'working' || status === 'busy') hasWorking = true;
                            if (status === 'running' || status === 'up' || status === 'online') hasUp = true;
                        }
                    }
                }

                // Aussi checker le cache des status live de la machine
                for (const skillName in machineData.skillStatuses) {
                    const status = machineData.skillStatuses[skillName];
                    if (status === 'working' || status === 'busy') hasWorking = true;
                    if (status === 'running' || status === 'up' || status === 'online') hasUp = true;
                }

                if (hasWorking) return 'working';
                if (hasUp) return 'online';
                return 'offline';
            }

            // Pour les autres machines, checker leurs skills locaux
            const skills = machine.skills || [];
            let hasWorking = false;
            let hasUp = false;

            for (const skill of skills) {
                const status = getSkillStatus(skill);
                if (status === 'working' || status === 'busy') hasWorking = true;
                if (status === 'running' || status === 'up' || status === 'online') hasUp = true;
            }

            // Aussi checker le cache des status live
            for (const skillName in machineData.skillStatuses) {
                const status = machineData.skillStatuses[skillName];
                if (status === 'working' || status === 'busy') hasWorking = true;
                if (status === 'running' || status === 'up' || status === 'online') hasUp = true;
            }

            if (hasWorking) return 'working';
            if (hasUp) return 'online';
            return 'offline';
        }

        // Mettre à jour l'apparence d'une machine
        function updateMachineAppearance(nodeId) {
            const machineData = meshes.machines[nodeId];
            if (!machineData || !machineData.mesh) return;

            const status = getAggregatedMachineStatus(nodeId);
            const baseColor = machineData.baseColor;
            const mat = machineData.mesh.material;
            const wireMat = machineData.wireframe ? machineData.wireframe.material : null;
            const glowMat = machineData.glow ? machineData.glow.material : null;

            if (status === 'working') {
                // Magenta pulsant
                mat.color = new THREE.Color(0xff00ff);
                mat.emissive = new THREE.Color(0xff00ff);
                mat.emissiveIntensity = 0.4;
                mat.opacity = 0.6;
                if (wireMat) wireMat.color = new THREE.Color(0xff00ff);
                if (glowMat) {
                    glowMat.color = new THREE.Color(0xff00ff);
                    glowMat.opacity = 1.0;
                }
                // Ajouter au pulsing
                if (!pulsingObjects.includes(machineData.mesh)) {
                    pulsingObjects.push(machineData.mesh);
                }
            } else if (status === 'online') {
                // Vert pour online/up
                const onlineColor = COLORS.up; // 0x00ff88 - vert
                mat.color = new THREE.Color(onlineColor);
                mat.emissive = new THREE.Color(onlineColor);
                mat.emissiveIntensity = 0.3;
                mat.opacity = 0.5;
                if (wireMat) wireMat.color = new THREE.Color(onlineColor);
                if (glowMat) {
                    glowMat.color = new THREE.Color(onlineColor);
                    glowMat.opacity = 0.9;
                }
                // Retirer du pulsing
                const idx = pulsingObjects.indexOf(machineData.mesh);
                if (idx !== -1) {
                    pulsingObjects.splice(idx, 1);
                    machineData.mesh.scale.setScalar(1);
                }
            } else {
                // Offline - grisé
                mat.color = new THREE.Color(0x444444);
                mat.emissive = new THREE.Color(0x222222);
                mat.emissiveIntensity = 0.05;
                mat.opacity = 0.25;
                if (wireMat) wireMat.color = new THREE.Color(0x555555);
                if (glowMat) {
                    glowMat.color = new THREE.Color(0x333333);
                    glowMat.opacity = 0.3;
                }
                // Retirer du pulsing
                const idx = pulsingObjects.indexOf(machineData.mesh);
                if (idx !== -1) {
                    pulsingObjects.splice(idx, 1);
                    machineData.mesh.scale.setScalar(1);
                }
            }

            console.log(`Machine ${nodeId}: status=${status}`);
        }

        function createTube(from, to, machine) {
            const direction = new THREE.Vector3().subVectors(to, from);
            const length = direction.length();

            // Tube path
            const curve = new THREE.CatmullRomCurve3([
                from,
                new THREE.Vector3(from.x * 0.5, 3, from.z * 0.5),
                new THREE.Vector3(to.x * 0.5, 3, to.z * 0.5),
                to
            ]);

            const tubeGeo = new THREE.TubeGeometry(curve, 32, 0.3, 8, false);
            const tubeMat = new THREE.MeshPhongMaterial({
                color: COLORS.tube,
                transparent: true,
                opacity: 0.4,
                side: THREE.DoubleSide
            });

            const tube = new THREE.Mesh(tubeGeo, tubeMat);
            tube.userData = { type: 'tube', from: machine.node_id, to: 'soma' };
            scene.add(tube);
            meshes.tubes.push(tube);

            // Data flow particles effect (simplified)
            const particleGeo = new THREE.SphereGeometry(0.15, 8, 8);
            const particleMat = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
            const particle = new THREE.Mesh(particleGeo, particleMat);
            particle.userData = { curve, progress: Math.random() };
            tube.add(particle);
        }

        function buildMachineView(machine) {
            const isSoma = machine.hostname === 'OnyxSoma' || machine.local_ip === '10.0.0.11';

            if (isSoma) {
                buildSomaInterior(machine);
            } else {
                buildHeartInterior(machine);
            }

            document.getElementById('btn-back').style.display = 'inline-block';
            document.getElementById('click-hint').classList.remove('visible');
        }

        function buildSomaInterior(machine) {
            // === OnyxCore (cerveau central) - Forme polymorphe animée ===
            const coreGroup = new THREE.Group();
            coreGroup.position.set(-4, 0, 0);
            coreGroup.userData = { type: 'onyxcore', data: machine, isPolymorphic: true };
            scene.add(coreGroup);

            // Noyau principal - Icosahedron avec vertices modifiables
            const coreGeo = new THREE.IcosahedronGeometry(3.5, 3);
            // Sauvegarder les positions originales pour le morphing
            coreGeo.userData = {
                originalPositions: coreGeo.attributes.position.array.slice()
            };
            const coreMat = new THREE.MeshPhongMaterial({
                color: COLORS.onyxcore,
                emissive: COLORS.onyxcore,
                emissiveIntensity: 0.4,
                transparent: true,
                opacity: 0.85,
                shininess: 100
            });
            const core = new THREE.Mesh(coreGeo, coreMat);
            coreGroup.add(core);

            // Couche externe semi-transparente
            const outerGeo = new THREE.IcosahedronGeometry(4.2, 2);
            const outerMat = new THREE.MeshPhongMaterial({
                color: COLORS.onyxcore,
                emissive: COLORS.onyxcore,
                emissiveIntensity: 0.2,
                transparent: true,
                opacity: 0.15,
                wireframe: true
            });
            const outer = new THREE.Mesh(outerGeo, outerMat);
            coreGroup.add(outer);

            // Particules orbitales
            const particleCount = 12;
            for (let i = 0; i < particleCount; i++) {
                const particleGeo = new THREE.SphereGeometry(0.15, 8, 8);
                const particleMat = new THREE.MeshBasicMaterial({
                    color: 0x00ffaa,
                    transparent: true,
                    opacity: 0.8
                });
                const particle = new THREE.Mesh(particleGeo, particleMat);
                particle.userData = {
                    orbitRadius: 4.5 + Math.random() * 1.5,
                    orbitSpeed: 0.3 + Math.random() * 0.4,
                    orbitPhase: (i / particleCount) * Math.PI * 2,
                    orbitTilt: Math.random() * 0.5
                };
                coreGroup.add(particle);
            }

            // Stocker pour l'animation
            meshes.onyxCore = { group: coreGroup, core, outer };

            createLabel('OnyxCore', coreGroup, 5.5);

            // === OnyxHeart (agent local) - Octahedron orange ===
            const heartGeo = new THREE.OctahedronGeometry(2.5, 0);
            const heartMat = new THREE.MeshPhongMaterial({
                color: COLORS.onyxheart,
                emissive: COLORS.onyxheart,
                emissiveIntensity: 0.4
            });
            const heart = new THREE.Mesh(heartGeo, heartMat);
            heart.position.set(4, 0, 0);
            heart.userData = { type: 'onyxheart', data: machine };
            scene.add(heart);

            const heartEdges = new THREE.EdgesGeometry(heartGeo);
            heart.add(new THREE.LineSegments(heartEdges, new THREE.LineBasicMaterial({ color: 0xffffff })));

            createLabel('OnyxHeart', heart, 3.5);

            // Connection Core <-> Heart
            createConnection(new THREE.Vector3(-4, 0, 0), new THREE.Vector3(4, 0, 0), 0xffffff, 0.6);

            // Brain areas in orbit around core
            const areas = data.areas || {};
            const areaKeys = Object.keys(areas);
            const areaRadius = 20;

            areaKeys.forEach((areaId, idx) => {
                const area = areas[areaId];
                const phi = Math.acos(-1 + (2 * idx + 1) / areaKeys.length);
                const theta = Math.sqrt(areaKeys.length * Math.PI) * phi;

                const x = areaRadius * Math.sin(phi) * Math.cos(theta);
                const y = areaRadius * Math.sin(phi) * Math.sin(theta) * 0.5;
                const z = areaRadius * Math.cos(phi);

                createAreaSphere(area, areaId, x, y, z);

                // Connection to core
                createConnection(new THREE.Vector3(0, 0, 0), new THREE.Vector3(x, y, z), COLORS.onyxcore, 0.2);
            });

            // Incoming tubes from other machines
            const otherMachines = (data.machines || []).filter(m =>
                m.hostname !== 'OnyxSoma' && m.local_ip !== '10.0.0.11'
            );

            otherMachines.forEach((remoteMachine, idx) => {
                const angle = (idx / otherMachines.length) * Math.PI * 2;
                const tubeRadius = 35;
                const tubeX = Math.cos(angle) * tubeRadius;
                const tubeZ = Math.sin(angle) * tubeRadius;

                createIncomingTube(remoteMachine, tubeX, 0, tubeZ, areas);
            });
        }

        function createAreaSphere(area, areaId, x, y, z) {
            const areaColor = AREA_COLORS[areaId] || AREA_COLORS.default;
            const skills = area.skills || [];
            const size = 2 + Math.min(skills.length * 0.3, 3);

            const areaGeo = new THREE.SphereGeometry(size, 32, 32);
            const areaMat = new THREE.MeshPhongMaterial({
                color: areaColor,
                transparent: true,
                opacity: 0.6,
                wireframe: false
            });

            const areaMesh = new THREE.Mesh(areaGeo, areaMat);
            areaMesh.position.set(x, y, z);
            areaMesh.userData = { type: 'area', data: area, areaId };
            scene.add(areaMesh);

            // Wireframe
            const areaEdges = new THREE.EdgesGeometry(areaGeo);
            const areaWire = new THREE.LineSegments(areaEdges, new THREE.LineBasicMaterial({
                color: areaColor,
                transparent: true,
                opacity: 0.8
            }));
            areaMesh.add(areaWire);

            createLabel(area.name || areaId, areaMesh, size + 1);

            // Stocker le wireframe et la couleur de base pour les updates
            meshes.areas[areaId] = {
                mesh: areaMesh,
                wireframe: areaWire,
                baseColor: areaColor,
                skills: [],
                skillStatuses: {}
            };

            // Skills around area - distribution sphérique 3D
            skills.forEach((skill, sIdx) => {
                const total = skills.length;
                const sRadius = size + 1.5; // Distance depuis le centre de l'aire

                // Distribution sur une sphère (algorithme de Fibonacci)
                const phi = Math.acos(1 - 2 * (sIdx + 0.5) / total);
                const theta = Math.PI * (1 + Math.sqrt(5)) * sIdx;

                const sx = Math.sin(phi) * Math.cos(theta) * sRadius;
                const sy = Math.sin(phi) * Math.sin(theta) * sRadius;
                const sz = Math.cos(phi) * sRadius;

                createSkillSphere(skill, areaMesh, sx, sy, sz, areaId);
            });

            // Update area appearance based on aggregated skill statuses
            updateAreaAppearance(areaId);
        }

        // Determine actual skill status from various fields
        function getSkillStatus(skill) {
            // Check live_status first (from realtime updates via Brain3D)
            if (skill.live_status) return skill.live_status;

            // Check runtime_status object (from OnyxCore API)
            if (skill.runtime_status) {
                if (skill.runtime_status.online === true) return 'running';
                if (skill.runtime_status.online === false) return 'off';
            }

            // Check online field (1/0) from OnyxCore
            if (skill.online === 1 || skill.online === true) return 'running';
            if (skill.online === 0 || skill.online === false) return 'off';

            // Check status field
            if (skill.status === 'prod' || skill.status === 'dev') {
                // Status is deployment status, not runtime
                return 'off';
            }

            // OnyxHeart reports "running" for registered skills even if not active
            // Without online field, we can't know if it's really running
            // Consider it "idle" (grey) until we get a live_status update
            if (skill.status === 'running' && (skill.online === undefined || skill.online === null)) {
                return 'idle';
            }

            return skill.status || 'unknown';
        }

        function createSkillSphere(skill, parent, x, y, z, areaId) {
            const status = getSkillStatus(skill);
            const color = getStatusColor(status);
            const skillName = skill.name || skill.skill_name || 'unknown';

            const skillGeo = new THREE.SphereGeometry(0.6, 16, 16);
            const skillMat = new THREE.MeshPhongMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.3
            });

            const skillMesh = new THREE.Mesh(skillGeo, skillMat);
            skillMesh.position.set(x, y, z);
            skillMesh.userData = { type: 'skill', data: skill, areaId, skillName };
            parent.add(skillMesh);

            meshes.skills[skillName] = { mesh: skillMesh, areaId };

            // Register skill status in area for aggregation
            if (areaId && meshes.areas[areaId] && skillName !== 'unknown') {
                meshes.areas[areaId].skillStatuses[skillName] = status;
                console.log(`Skill ${skillName} in ${areaId}: status=${status}`);
            }

            if (status === 'working' || status === 'busy') {
                pulsingObjects.push(skillMesh);
            }

            // Connection to area center
            const points = [new THREE.Vector3(0, 0, 0), new THREE.Vector3(x, y, z)];
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.5
            }));
            parent.add(line);
        }

        function createIncomingTube(remoteMachine, x, y, z, areas) {
            // Tube entry point
            const tubeGeo = new THREE.CylinderGeometry(1.5, 2, 4, 16, 1, true);
            const tubeMat = new THREE.MeshPhongMaterial({
                color: COLORS.tube,
                transparent: true,
                opacity: 0.5,
                side: THREE.DoubleSide
            });

            const tubeEntry = new THREE.Mesh(tubeGeo, tubeMat);
            tubeEntry.position.set(x, y, z);
            tubeEntry.lookAt(0, 0, 0);
            tubeEntry.rotateX(Math.PI / 2);
            tubeEntry.userData = { type: 'tube-entry', machine: remoteMachine };
            scene.add(tubeEntry);

            createLabel(remoteMachine.hostname || remoteMachine.node_id, tubeEntry, 3);

            // Skills from remote machine connecting to their areas
            const remoteSkills = remoteMachine.skills || [];
            remoteSkills.forEach((skill, idx) => {
                const brainArea = skill.brain_area_id || skill.brain_area || 'external';
                if (meshes.areas[brainArea]) {
                    const areaPos = meshes.areas[brainArea].mesh.position;
                    const tubePos = new THREE.Vector3(x, y, z);

                    // Create connection line from tube to area
                    createConnection(tubePos, areaPos, getStatusColor(getSkillStatus(skill)), 0.3);
                }
            });
        }

        function buildHeartInterior(machine) {
            // Central OnyxHeart
            const heartGeo = new THREE.OctahedronGeometry(3, 0);
            const heartMat = new THREE.MeshPhongMaterial({
                color: COLORS.onyxheart,
                emissive: COLORS.onyxheart,
                emissiveIntensity: 0.4
            });

            const heart = new THREE.Mesh(heartGeo, heartMat);
            heart.userData = { type: 'onyxheart', data: machine };
            scene.add(heart);

            const heartEdges = new THREE.EdgesGeometry(heartGeo);
            heart.add(new THREE.LineSegments(heartEdges, new THREE.LineBasicMaterial({ color: 0xffffff })));

            createLabel('OnyxHeart', heart, 4);

            // Skills around heart
            const skills = machine.skills || [];
            const skillRadius = 12;

            skills.forEach((skill, idx) => {
                const angle = (idx / Math.max(skills.length, 1)) * Math.PI * 2;
                const x = Math.cos(angle) * skillRadius;
                const z = Math.sin(angle) * skillRadius;

                createLocalSkill(skill, x, 0, z, machine.local_ip);

                // Connection to heart
                createConnection(new THREE.Vector3(0, 0, 0), new THREE.Vector3(x, 0, z), COLORS.onyxheart, 0.15);
            });

            // Tube to OnyxSoma
            const tubeGeo = new THREE.CylinderGeometry(2, 1.5, 5, 16, 1, true);
            const tubeMat = new THREE.MeshPhongMaterial({
                color: COLORS.tube,
                transparent: true,
                opacity: 0.5,
                side: THREE.DoubleSide
            });

            const tubeTosoma = new THREE.Mesh(tubeGeo, tubeMat);
            tubeTosoma.position.set(0, 15, 0);
            tubeTosoma.userData = { type: 'tube-to-soma' };
            scene.add(tubeTosoma);

            createLabel('→ OnyxSoma', tubeTosoma, 3);

            // Connection lines from skills to tube
            skills.forEach((skill, idx) => {
                const angle = (idx / Math.max(skills.length, 1)) * Math.PI * 2;
                const x = Math.cos(angle) * skillRadius;
                const z = Math.sin(angle) * skillRadius;

                createConnection(
                    new THREE.Vector3(x, 0, z),
                    new THREE.Vector3(0, 15, 0),
                    getStatusColor(getSkillStatus(skill)),
                    0.1
                );
            });
        }

        function createLocalSkill(skill, x, y, z, machineIp) {
            const status = getSkillStatus(skill);
            const color = getStatusColor(status);

            const skillGeo = new THREE.SphereGeometry(1.5, 24, 24);
            const skillMat = new THREE.MeshPhongMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.3
            });

            const skillMesh = new THREE.Mesh(skillGeo, skillMat);
            skillMesh.position.set(x, y, z);
            skillMesh.userData = { type: 'skill', data: skill, local: true, machineIp };
            scene.add(skillMesh);

            // Wireframe
            const edges = new THREE.EdgesGeometry(skillGeo);
            skillMesh.add(new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: color })));

            createLabel(skill.display_name || skill.skill_name || skill.name, skillMesh, 2);

            // Store with machine IP key for remote updates
            const skillName = skill.skill_name || skill.name;
            const skillKey = machineIp ? `${machineIp}:${skillName}` : skillName;
            meshes.skills[skillKey] = { mesh: skillMesh, machineIp };

            if (status === 'working' || status === 'busy') {
                pulsingObjects.push(skillMesh);
            }
        }

        function createConnection(from, to, color, opacity) {
            const points = [from, to];
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({
                color: color,
                transparent: true,
                opacity: opacity
            });
            const line = new THREE.Line(geometry, material);
            scene.add(line);
            meshes.connections.push(line);
        }

        function createLabel(text, parent, yOffset, icon = null) {
            // Simple sprite label with optional icon
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 320;
            canvas.height = 64;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const displayText = icon ? `${icon} ${text}` : text;

            ctx.font = 'bold 22px Arial, sans-serif';
            ctx.fillStyle = '#00d4aa';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(displayText, canvas.width / 2, canvas.height / 2);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.position.set(0, yOffset, 0);
            sprite.scale.set(10, 2, 1);
            parent.add(sprite);
            meshes.labels.push(sprite);
        }

        // ========== INTERACTION ==========
        function onTouchEnd(event) {
            event.preventDefault();
            if (event.changedTouches.length === 0) return;

            const touch = event.changedTouches[0];
            handleInteraction(touch.clientX, touch.clientY);
        }

        function onClick(event) {
            handleInteraction(event.clientX, event.clientY);
        }

        function handleInteraction(clientX, clientY) {
            const mouse = new THREE.Vector2(
                (clientX / window.innerWidth) * 2 - 1,
                -(clientY / window.innerHeight) * 2 + 1
            );

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(scene.children, true);

            for (const intersect of intersects) {
                const obj = intersect.object;
                const userData = obj.userData;

                if (userData.type === 'machine') {
                    // Enter machine view (only for OnyxHeart machines)
                    if (userData.data.has_onyxheart !== false) {
                        currentMachine = userData.data;
                        currentView = 'machine';
                        viewStack.push('machine:' + userData.data.node_id);

                        // Animate camera
                        animateCameraTo(obj.position.clone(), () => {
                            buildCurrentView();
                            resetCamera();
                        });
                    } else {
                        // Show detail for non-OnyxHeart machines
                        showDetail(userData.data, 'machine');
                    }
                    return;
                }

                if (userData.type === 'network-device') {
                    // Show detail panel for network devices (no interior view)
                    showDetail(userData.data, 'network-device');
                    return;
                }

                if (userData.type === 'tube-entry') {
                    // Show remote machine info
                    showDetail(userData.machine, 'machine');
                    return;
                }

                if (userData.type === 'tube-to-soma') {
                    // Go back to OnyxSoma
                    const soma = data.machines.find(m => m.hostname === 'OnyxSoma');
                    if (soma) {
                        currentMachine = soma;
                        buildCurrentView();
                        resetCamera();
                    }
                    return;
                }

                if (userData.type === 'skill') {
                    showDetail(userData.data, 'skill');
                    return;
                }

                if (userData.type === 'area') {
                    showDetail(userData, 'area');
                    return;
                }

                if (userData.type === 'onyxcore' || userData.type === 'onyxheart') {
                    showDetail(userData.data, userData.type);
                    return;
                }
            }
        }

        function onMouseMove(event) {
            // Highlight on hover
            const mouse = new THREE.Vector2(
                (event.clientX / window.innerWidth) * 2 - 1,
                -(event.clientY / window.innerHeight) * 2 + 1
            );

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            // Reset cursor
            document.body.style.cursor = 'default';

            for (const intersect of intersects) {
                if (intersect.object.userData.type) {
                    document.body.style.cursor = 'pointer';
                    break;
                }
            }
        }

        function showDetail(item, type) {
            const panel = document.getElementById('detail-panel');
            const title = document.getElementById('detail-title');
            const content = document.getElementById('detail-content');

            let html = '';

            if (type === 'machine' || type === 'onyxcore' || type === 'onyxheart') {
                const m = item;
                const isCore = type === 'onyxcore' || m.hostname === 'OnyxSoma';
                title.textContent = (isCore ? '🧠 ' : '💻 ') + (m.hostname || m.node_id);

                html = `
                    <div class="stat-row"><span class="stat-label">Type</span><span class="stat-value">${isCore ? 'OnyxCore' : 'OnyxHeart'}</span></div>
                    <div class="stat-row"><span class="stat-label">Status</span><span class="stat-value" style="color:${getStatusColorHex(m.status)}">${m.status}</span></div>
                    <div class="stat-row"><span class="stat-label">IP</span><span class="stat-value">${m.local_ip || 'N/A'}:${m.api_port || 8900}</span></div>
                    <div class="stat-row"><span class="stat-label">Platform</span><span class="stat-value">${m.platform || '?'}/${m.architecture || '?'}</span></div>
                    <div class="stat-row"><span class="stat-label">Hardware</span><span class="stat-value">${m.cpu_count || '?'} CPU / ${m.ram_mb ? Math.round(m.ram_mb/1024) : '?'} GB</span></div>
                    <h4 style="margin-top:15px;color:#00d4aa;border-top:1px solid #333;padding-top:10px;">Skills (${(m.skills||[]).length})</h4>
                    <div class="skill-list">
                        ${(m.skills || []).length === 0 ? '<p style="color:#666">No skills registered</p>' :
                          (m.skills || []).map(s => `
                            <div class="skill-item">
                                <div class="skill-dot" style="background:${getStatusColorHex(getSkillStatus(s))}"></div>
                                <div>
                                    <div>${s.display_name || s.skill_name || s.name}</div>
                                    <div style="font-size:0.75em;color:#666">Port ${s.port||'?'} • ${s.brain_area||'?'}</div>
                                </div>
                            </div>
                          `).join('')
                        }
                    </div>
                `;
            } else if (type === 'network-device') {
                const d = item;
                const icon = getDeviceIcon(d);
                title.textContent = icon + ' ' + (d.hostname || d.node_id);
                html = `
                    <div class="stat-row"><span class="stat-label">Type</span><span class="stat-value">${d.device_type || 'unknown'}</span></div>
                    <div class="stat-row"><span class="stat-label">IP</span><span class="stat-value">${d.local_ip || 'N/A'}</span></div>
                    <div class="stat-row"><span class="stat-label">MAC</span><span class="stat-value">${d.mac || 'N/A'}</span></div>
                    <div class="stat-row"><span class="stat-label">OS</span><span class="stat-value">${d.platform || 'N/A'}</span></div>
                    <div class="stat-row"><span class="stat-label">Role</span><span class="stat-value">${d.role || 'N/A'}</span></div>
                    <div class="stat-row"><span class="stat-label">WoL</span><span class="stat-value">${d.wol_enabled ? '✅ Enabled' : '❌ Disabled'}</span></div>
                    <div class="stat-row"><span class="stat-label">OnyxHeart</span><span class="stat-value" style="color:#ff6b35">❌ Not installed</span></div>
                    <p style="margin-top:15px;color:#666;font-size:0.85em;border-top:1px solid #333;padding-top:10px;">
                        This device doesn't have OnyxHeart installed.<br>
                        Install OnyxHeart to enable remote monitoring and skills.
                    </p>
                `;
            } else if (type === 'skill') {
                const s = item;
                title.textContent = '⚡ ' + (s.display_name || s.skill_name || s.name);
                html = `
                    <div class="stat-row"><span class="stat-label">Name</span><span class="stat-value">${s.name || s.skill_name}</span></div>
                    <div class="stat-row"><span class="stat-label">Status</span><span class="stat-value" style="color:${getStatusColorHex(getSkillStatus(s))}">${getSkillStatus(s)}</span></div>
                    <div class="stat-row"><span class="stat-label">Port</span><span class="stat-value">${s.port || 'N/A'}</span></div>
                    <div class="stat-row"><span class="stat-label">Brain Area</span><span class="stat-value">${s.brain_area_id || s.brain_area || 'N/A'}</span></div>
                    <div class="stat-row"><span class="stat-label">Category</span><span class="stat-value">${s.category || 'N/A'}</span></div>
                    ${s.description ? `<p style="margin-top:10px;color:#888;font-size:0.9em">${s.description}</p>` : ''}
                `;
            } else if (type === 'area') {
                const a = item.data;
                const areaId = item.areaId;
                title.textContent = '🧩 ' + (a.name || areaId);
                html = `
                    <div class="stat-row"><span class="stat-label">Area ID</span><span class="stat-value">${areaId}</span></div>
                    <div class="stat-row"><span class="stat-label">Skills</span><span class="stat-value">${(a.skills||[]).length}</span></div>
                    <div class="skill-list">
                        ${(a.skills || []).map(s => `
                            <div class="skill-item">
                                <div class="skill-dot" style="background:${getStatusColorHex(getSkillStatus(s))}"></div>
                                <span>${s.display_name || s.name}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            content.innerHTML = html;
            panel.classList.add('visible');
        }

        function closeDetail() {
            document.getElementById('detail-panel').classList.remove('visible');
        }

        // ========== NAVIGATION ==========
        function goBack() {
            if (viewStack.length > 1) {
                viewStack.pop();
                const prev = viewStack[viewStack.length - 1];

                if (prev === 'network') {
                    currentView = 'network';
                    currentMachine = null;
                } else if (prev.startsWith('machine:')) {
                    const nodeId = prev.split(':')[1];
                    currentMachine = data.machines.find(m => m.node_id === nodeId);
                    currentView = 'machine';
                }

                buildCurrentView();
                resetCamera();
            }
        }

        function updateBreadcrumb() {
            const bc = document.getElementById('breadcrumb');
            let html = '<span class="crumb' + (currentView === 'network' ? ' active' : '') + '" onclick="goToNetwork()">🌐 Network</span>';

            if (currentView === 'machine' && currentMachine) {
                const isSoma = currentMachine.hostname === 'OnyxSoma';
                html += '<span class="separator"> › </span>';
                html += `<span class="crumb active">${isSoma ? '🧠' : '💻'} ${currentMachine.hostname || currentMachine.node_id}</span>`;
            }

            bc.innerHTML = html;
        }

        function goToNetwork() {
            currentView = 'network';
            currentMachine = null;
            viewStack = ['network'];
            buildCurrentView();
            resetCamera();
        }

        // ========== HELPERS ==========
        function getStatusColor(status) {
            return COLORS[(status || 'unknown').toLowerCase()] || COLORS.unknown;
        }

        function getStatusColorHex(status) {
            const colors = {
                up: '#00ff88', online: '#00ff88', running: '#00ff88',
                down: '#888888', offline: '#888888', off: '#888888', stopped: '#888888', idle: '#888888',
                working: '#ff00ff', busy: '#ff00ff',
                error: '#ff4444', failed: '#ff4444'
            };
            return colors[(status || 'unknown').toLowerCase()] || '#555555';
        }

        // Compute aggregated status for an area based on its skills
        // Priority: working > up/running > off/stopped
        function getAggregatedAreaStatus(areaId) {
            const areaData = meshes.areas[areaId];
            if (!areaData || !areaData.skillStatuses) return 'off';

            const statuses = Object.values(areaData.skillStatuses);
            if (statuses.length === 0) return 'off';

            // Check for working first (highest priority)
            if (statuses.some(s => s === 'working' || s === 'busy')) {
                return 'working';
            }
            // Check for up/running
            if (statuses.some(s => s === 'up' || s === 'running' || s === 'online')) {
                return 'up';
            }
            // Default to off
            return 'off';
        }

        // Update area appearance based on aggregated status
        function updateAreaAppearance(areaId) {
            const areaData = meshes.areas[areaId];
            if (!areaData || !areaData.mesh) return;

            const status = getAggregatedAreaStatus(areaId);
            const baseColor = areaData.baseColor || AREA_COLORS[areaId] || AREA_COLORS.default;

            // Modulate color, opacity and emissive based on status
            const mat = areaData.mesh.material;
            const wireMat = areaData.wireframe ? areaData.wireframe.material : null;

            if (status === 'working') {
                mat.color = new THREE.Color(baseColor);
                mat.emissive = new THREE.Color(0xff00ff);
                mat.emissiveIntensity = 0.5;
                mat.opacity = 0.8;
                if (wireMat) {
                    wireMat.color = new THREE.Color(0xff00ff);
                    wireMat.opacity = 1.0;
                }
                // Add to pulsing
                if (!pulsingObjects.includes(areaData.mesh)) {
                    pulsingObjects.push(areaData.mesh);
                }
            } else if (status === 'up') {
                mat.color = new THREE.Color(baseColor);
                mat.emissive = new THREE.Color(baseColor);
                mat.emissiveIntensity = 0.3;
                mat.opacity = 0.7;
                if (wireMat) {
                    wireMat.color = new THREE.Color(baseColor);
                    wireMat.opacity = 0.8;
                }
                // Remove from pulsing
                const idx = pulsingObjects.indexOf(areaData.mesh);
                if (idx !== -1) {
                    pulsingObjects.splice(idx, 1);
                    areaData.mesh.scale.setScalar(1);
                }
            } else {
                // off - griser completement l'aire
                mat.color = new THREE.Color(0x333333);
                mat.emissive = new THREE.Color(0x111111);
                mat.emissiveIntensity = 0.02;
                mat.opacity = 0.2;
                if (wireMat) {
                    wireMat.color = new THREE.Color(0x444444);
                    wireMat.opacity = 0.3;
                }
                // Remove from pulsing
                const idx = pulsingObjects.indexOf(areaData.mesh);
                if (idx !== -1) {
                    pulsingObjects.splice(idx, 1);
                    areaData.mesh.scale.setScalar(1);
                }
            }

            // Debug log
            console.log(`Area ${areaId}: ${Object.keys(areaData.skillStatuses || {}).length} skills, status=${status}`);
        }

        function clearScene() {
            // Remove ALL objects except lights and camera
            const toRemove = [];
            scene.traverse((obj) => {
                if (obj.isMesh || obj.isLine || obj.isLineSegments || obj.isSprite || obj.isGroup) {
                    toRemove.push(obj);
                }
            });
            toRemove.forEach(obj => {
                scene.remove(obj);
                if (obj.geometry) obj.geometry.dispose();
                if (obj.material) {
                    if (Array.isArray(obj.material)) {
                        obj.material.forEach(m => m.dispose());
                    } else {
                        obj.material.dispose();
                    }
                }
            });

            // Clear tracking arrays
            meshes = { machines: {}, tubes: [], areas: {}, skills: {}, connections: [], labels: [], onyxCore: null };
            pulsingObjects = [];
        }

        function updateStats() {
            document.getElementById('stat-machines').textContent = (data.machines || []).length;
            document.getElementById('stat-online').textContent = (data.machines || []).filter(m => m.status === 'online').length;
            document.getElementById('stat-skills').textContent = data.stats?.total_skills || Object.keys(data.areas || {}).reduce((sum, k) => sum + (data.areas[k].skills || []).length, 0);
            document.getElementById('stat-areas').textContent = Object.keys(data.areas || {}).length;
        }

        function handleStatusUpdate(update) {
            // Update skill status in realtime
            const skillName = update.skill_name;
            const skillKey = update.host ? `${update.host}:${skillName}` : skillName;
            const brainArea = update.brain_area || 'external';

            // Try multiple keys to find the skill
            const keysToTry = [skillKey, skillName];
            let areaToUpdate = null;
            let machineToUpdate = null;
            let skillFound = false;

            for (const key of keysToTry) {
                if (meshes.skills[key]) {
                    skillFound = true;
                    const color = getStatusColor(update.status);
                    meshes.skills[key].mesh.material.color.setHex(color);
                    meshes.skills[key].mesh.material.emissive.setHex(color);

                    // Add/remove from pulsing if working
                    const idx = pulsingObjects.indexOf(meshes.skills[key].mesh);
                    if (update.status === 'working' || update.status === 'busy') {
                        if (idx === -1) pulsingObjects.push(meshes.skills[key].mesh);
                    } else {
                        if (idx !== -1) pulsingObjects.splice(idx, 1);
                        meshes.skills[key].mesh.scale.setScalar(1);
                    }

                    // Update area status tracking and propagate
                    const areaId = meshes.skills[key].areaId;
                    if (areaId && meshes.areas[areaId]) {
                        meshes.areas[areaId].skillStatuses[skillName] = update.status;
                        areaToUpdate = areaId;
                    }
                    break;
                }
            }

            // Si le skill n'a pas de mesh mais a une brain_area, mettre a jour l'aire quand meme
            // Cela gere les skills desktop (hbi-plate, etc) qui passent de off a working
            if (!skillFound && brainArea && meshes.areas[brainArea]) {
                meshes.areas[brainArea].skillStatuses[skillName] = update.status;
                areaToUpdate = brainArea;
                console.log(`Skill ${skillName} (no mesh) updated area ${brainArea} to ${update.status}`);
            }

            // Update parent area appearance if skill was found or area was updated
            if (areaToUpdate) {
                updateAreaAppearance(areaToUpdate);
            }

            // Also update in data for persistence and find machine to update
            if (update.host && data.machines) {
                const machine = data.machines.find(m => m.local_ip === update.host || m.hostname === update.host);
                if (machine) {
                    if (machine.skills) {
                        const skill = machine.skills.find(s => s.skill_name === skillName || s.name === skillName);
                        if (skill) skill.status = update.status;
                    }
                    // Update machine skill status cache
                    if (meshes.machines[machine.node_id]) {
                        meshes.machines[machine.node_id].skillStatuses[skillName] = update.status;
                        machineToUpdate = machine.node_id;
                    }
                }
            }

            // Pour les skills sur OnyxSoma (pas de host), mettre à jour OnyxSoma
            if (!update.host && areaToUpdate) {
                // Trouver OnyxSoma
                for (const nodeId in meshes.machines) {
                    if (meshes.machines[nodeId].isSoma) {
                        machineToUpdate = nodeId;
                        break;
                    }
                }
            }

            // Update machine appearance
            if (machineToUpdate) {
                updateMachineAppearance(machineToUpdate);
            }
        }

        // ========== CAMERA ==========
        function resetCamera() {
            if (currentView === 'network') {
                camera.position.set(40, 30, 40);
            } else {
                camera.position.set(25, 20, 25);
            }
            camera.lookAt(0, 0, 0);
            controls.target.set(0, 0, 0);
        }

        function animateCameraTo(target, callback) {
            // Simple instant transition for now
            callback();
        }

        function toggleRotation() {
            autoRotate = !autoRotate;
            document.getElementById('btn-rotate').classList.toggle('active', autoRotate);
        }

        // ========== MONITORING SYSTEM ==========
        function toggleMonitoring() {
            monitoringEnabled = !monitoringEnabled;
            document.getElementById('btn-monitoring').classList.toggle('active', monitoringEnabled);

            // Afficher/masquer la legende des metriques
            const legendMetrics = document.getElementById('legend-metrics');
            if (legendMetrics) {
                legendMetrics.style.display = monitoringEnabled ? 'block' : 'none';
            }

            if (monitoringEnabled) {
                // Afficher toutes les spheres de metriques
                showAllMetricSpheres();
                // Demarrer le polling des metriques
                startMonitoringPolling();
                console.log('[Brain3D] Monitoring enabled');
            } else {
                // Cacher toutes les spheres de metriques
                hideAllMetricSpheres();
                // Arreter le polling
                stopMonitoringPolling();
                console.log('[Brain3D] Monitoring disabled');
            }
        }

        function showAllMetricSpheres() {
            for (const nodeId in meshes.machines) {
                const machineData = meshes.machines[nodeId];
                if (machineData.metricSpheres) {
                    for (const metricName in machineData.metricSpheres) {
                        machineData.metricSpheres[metricName].visible = true;
                    }
                }
            }
        }

        function hideAllMetricSpheres() {
            for (const nodeId in meshes.machines) {
                const machineData = meshes.machines[nodeId];
                if (machineData.metricSpheres) {
                    for (const metricName in machineData.metricSpheres) {
                        machineData.metricSpheres[metricName].visible = false;
                    }
                }
            }
        }

        function startMonitoringPolling() {
            if (monitoringInterval) clearInterval(monitoringInterval);
            // Premiere requete immediatement
            fetchMetrics();
            // Puis toutes les X secondes
            monitoringInterval = setInterval(fetchMetrics, MONITORING_REFRESH_MS);
        }

        function stopMonitoringPolling() {
            if (monitoringInterval) {
                clearInterval(monitoringInterval);
                monitoringInterval = null;
            }
        }

        async function fetchMetrics() {
            try {
                const response = await fetch('/api/metrics');
                if (response.ok) {
                    const metricsData = await response.json();
                    updateAllMetrics(metricsData);
                }
            } catch (e) {
                console.error('[Brain3D] Failed to fetch metrics:', e);
            }
        }

        function updateAllMetrics(metricsData) {
            // metricsData = { "node_id": { cpu: 45, ram: 67, gpu: 0, disk: 23 }, ... }
            for (const nodeId in metricsData) {
                const metrics = metricsData[nodeId];
                updateMachineMetrics(nodeId, metrics);
            }
        }

        function updateMachineMetrics(nodeId, metrics) {
            const machineData = meshes.machines[nodeId];
            if (!machineData || !machineData.metricSpheres) return;

            for (const metricName in metrics) {
                const sphere = machineData.metricSpheres[metricName];
                if (sphere) {
                    // Valeur de 0 a 100
                    const value = Math.min(100, Math.max(0, metrics[metricName] || 0));
                    sphere.userData.value = value;

                    // Ajuster l'opacite selon la charge (plus charge = plus visible)
                    const minOpacity = 0.3;
                    const maxOpacity = 1.0;
                    sphere.material.opacity = minOpacity + (value / 100) * (maxOpacity - minOpacity);
                }
            }
        }

        // Animation des spheres de metriques (pulsation selon charge)
        function animateMetricSpheres() {
            if (!monitoringEnabled) return;

            for (const nodeId in meshes.machines) {
                const machineData = meshes.machines[nodeId];
                if (!machineData || !machineData.metricSpheres) continue;

                for (const metricName in machineData.metricSpheres) {
                    const sphere = machineData.metricSpheres[metricName];
                    if (!sphere.visible) continue;

                    const value = sphere.userData.value || 0;
                    const phase = sphere.userData.pulsePhase || 0;

                    // Frequence de pulsation proportionnelle a la charge
                    // Charge 0% = pas de pulsation, Charge 100% = pulsation rapide
                    const pulseSpeed = 1 + (value / 100) * 4;  // 1 a 5 Hz
                    const pulseAmplitude = 0.1 + (value / 100) * 0.4;  // 10% a 50% d'amplitude

                    // Calculer le facteur de pulsation
                    const pulse = 1 + Math.sin(animationTime * pulseSpeed + phase) * pulseAmplitude;

                    sphere.scale.setScalar(pulse);
                }
            }
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ========== ANIMATION ==========
        function animate() {
            requestAnimationFrame(animate);
            animationTime += 0.016;

            controls.autoRotate = autoRotate;
            controls.autoRotateSpeed = 0.5;
            controls.update();

            // Pulse working objects (subtle breathing effect)
            const pulse = 1 + Math.sin(animationTime * 2) * 0.08;
            pulsingObjects.forEach(obj => {
                obj.scale.setScalar(pulse);
            });

            // Animate OnyxCore polymorphic shape
            if (meshes.onyxCore) {
                const { group, core, outer } = meshes.onyxCore;

                // Rotation lente du groupe
                group.rotation.y += 0.002;
                group.rotation.x = Math.sin(animationTime * 0.3) * 0.1;

                // Morphing du noyau - déformation douce des vertices
                if (core.geometry.userData.originalPositions) {
                    const positions = core.geometry.attributes.position.array;
                    const original = core.geometry.userData.originalPositions;
                    const time = animationTime * 0.5;

                    for (let i = 0; i < positions.length; i += 3) {
                        const ox = original[i], oy = original[i+1], oz = original[i+2];
                        const dist = Math.sqrt(ox*ox + oy*oy + oz*oz);
                        const noise = Math.sin(ox * 2 + time) * Math.cos(oy * 2 + time * 1.3) * Math.sin(oz * 2 + time * 0.7);
                        const morph = 1 + noise * 0.12;
                        positions[i] = ox * morph;
                        positions[i+1] = oy * morph;
                        positions[i+2] = oz * morph;
                    }
                    core.geometry.attributes.position.needsUpdate = true;
                    core.geometry.computeVertexNormals();
                }

                // Pulsation de la couche externe
                outer.scale.setScalar(1 + Math.sin(animationTime * 1.5) * 0.05);
                outer.rotation.y -= 0.003;

                // Animation des particules orbitales
                group.children.forEach(child => {
                    if (child.userData.orbitRadius) {
                        const { orbitRadius, orbitSpeed, orbitPhase, orbitTilt } = child.userData;
                        const angle = animationTime * orbitSpeed + orbitPhase;
                        child.position.x = Math.cos(angle) * orbitRadius;
                        child.position.y = Math.sin(angle * 2) * orbitTilt * 2;
                        child.position.z = Math.sin(angle) * orbitRadius;
                    }
                });
            }

            // Animate tube particles
            meshes.tubes.forEach(tube => {
                tube.children.forEach(child => {
                    if (child.userData.curve) {
                        child.userData.progress = (child.userData.progress + 0.005) % 1;
                        const pos = child.userData.curve.getPoint(child.userData.progress);
                        child.position.copy(pos).sub(tube.position);
                    }
                });
            });

            // Animer les spheres de metriques (pulsation)
            animateMetricSpheres();

            renderer.render(scene, camera);
        }

        // ========== START ==========
        init();
    </script>
