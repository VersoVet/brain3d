<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0f">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* Prevent touch scrolling on canvas */
        #canvas-container {
            touch-action: none;
        }
        /* Safe area insets for notched devices */
        @supports (padding: env(safe-area-inset-bottom)) {
            #stats-panel {
                padding-bottom: calc(10px + env(safe-area-inset-bottom));
            }
            #info-panel {
                padding-bottom: env(safe-area-inset-bottom);
            }
        }
    </style>
</head>
<body>
    <!-- Container 3D -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div id="ui-overlay">
        <!-- Header -->
        <div id="header">
            <h1>Brain3D</h1>
            <div id="status-indicator">
                <span id="redis-status" class="status-dot"></span>
                <span id="connection-info">Connecting...</span>
            </div>
        </div>

        <!-- Controls -->
        <div id="controls">
            <button id="btn-reset-view" title="Reset View">⟲</button>
            <button id="btn-toggle-rotate" title="Auto Rotate">↻</button>
            <button id="btn-toggle-metrics" title="Toggle Metrics">📊</button>
            <button id="btn-refresh" title="Refresh">🔄</button>
        </div>

        <!-- Info Panel (machine/skill details) -->
        <div id="info-panel" class="panel hidden">
            <div class="panel-header">
                <span id="panel-title">Details</span>
                <button id="btn-close-panel">×</button>
            </div>
            <div id="panel-content"></div>
        </div>

        <!-- Stats Panel -->
        <div id="stats-panel" class="panel">
            <div class="stat">
                <span class="stat-label">Machines</span>
                <span id="stat-machines" class="stat-value">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Skills</span>
                <span id="stat-skills" class="stat-value">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Up</span>
                <span id="stat-up" class="stat-value status-up">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Working</span>
                <span id="stat-working" class="stat-value status-working">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Error</span>
                <span id="stat-error" class="stat-value status-error">0</span>
            </div>
        </div>

        <!-- Legend -->
        <div id="legend" class="panel">
            <div class="legend-item">
                <span class="legend-shape cube"></span>
                <span>Heart Machine</span>
            </div>
            <div class="legend-item">
                <span class="legend-shape sphere blue"></span>
                <span>Network Device</span>
            </div>
            <div class="legend-item">
                <span class="legend-shape dodeca cyan"></span>
                <span>OnyxCore</span>
            </div>
            <div class="legend-item">
                <span class="legend-shape icosa violet"></span>
                <span>OnyxForge</span>
            </div>
        </div>

        <!-- Breadcrumb (navigation) -->
        <div id="breadcrumb" class="hidden">
            <span id="breadcrumb-path"></span>
            <button id="btn-back">← Back</button>
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <!-- App modules (v3.2) -->
    <script src="/static/js/config.js?v=3.3"></script>
    <script src="/static/js/websocket.js?v=3.3"></script>
    <script src="/static/js/scene.js?v=3.3"></script>
    <script src="/static/js/physics.js?v=3.3"></script>
    <script src="/static/js/machines.js?v=3.3"></script>
    <script src="/static/js/connections.js?v=3.3"></script>
    <script src="/static/js/animations.js?v=3.3"></script>
    <script src="/static/js/internal.js?v=3.3"></script>
    <script src="/static/js/navigation.js?v=3.3"></script>
    <script src="/static/js/ui.js?v=3.3"></script>
    <script src="/static/js/app.js?v=3.3"></script>
</body>
</html>
