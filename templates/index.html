<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0f">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* Prevent touch scrolling on canvas */
        #canvas-container {
            touch-action: none;
        }
        /* Safe area insets for notched devices */
        @supports (padding: env(safe-area-inset-bottom)) {
            #stats-panel {
                padding-bottom: calc(10px + env(safe-area-inset-bottom));
            }
            #info-panel {
                padding-bottom: env(safe-area-inset-bottom);
            }
        }
    </style>
</head>
<body>
    <!-- Container 3D -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div id="ui-overlay">
        <!-- Header -->
        <div id="header">
            <h1>Brain3D</h1>
            <div id="status-indicator">
                <span id="redis-status" class="status-dot"></span>
                <span id="connection-info">Connecting...</span>
            </div>
        </div>

        <!-- Controls -->
        <div id="controls">
            <button id="btn-reset-view" title="Reset View">⟲</button>
            <button id="btn-toggle-rotate" title="Auto Rotate">↻</button>
            <button id="btn-refresh" title="Refresh">🔄</button>
        </div>

        <!-- Stats Panel -->
        <div id="stats-panel" class="panel">
            <div class="stat">
                <span class="stat-label">Machines</span>
                <span id="stat-machines" class="stat-value">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Skills</span>
                <span id="stat-skills" class="stat-value">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">UP</span>
                <span id="stat-up" class="stat-value status-up">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Working</span>
                <span id="stat-working" class="stat-value status-working">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Error</span>
                <span id="stat-error" class="stat-value status-error">0</span>
            </div>
        </div>

        <!-- Machine Panel (right side) -->
        <div id="machine-panel" class="hidden">
            <div id="mp-header">
                <div id="mp-title">
                    <span id="mp-icon">🖥</span>
                    <span id="mp-hostname">—</span>
                </div>
                <button id="mp-close">×</button>
            </div>
            <div id="mp-meta">
                <div class="mp-row">
                    <span class="mp-label">IP</span>
                    <span id="mp-ip">—</span>
                </div>
                <div class="mp-row">
                    <span class="mp-label">Statut</span>
                    <span id="mp-status"><span id="mp-status-dot">●</span> <span id="mp-status-text">—</span></span>
                </div>
            </div>
            <div id="mp-skills-section">
                <div id="mp-skills-header">
                    Skills <span id="mp-skills-count"></span>
                </div>
                <div id="mp-skills-list"></div>
            </div>
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <!-- App modules (v5.0 - Single network view) -->
    <script src="/static/js/config.js?v=5.0"></script>
    <script src="/static/js/websocket.js?v=5.0"></script>
    <script src="/static/js/scene.js?v=5.0"></script>
    <script src="/static/js/animations.js?v=5.0"></script>
    <script src="/static/js/network-view.js?v=5.0"></script>
    <script src="/static/js/ui.js?v=5.0"></script>
    <script src="/static/js/app.js?v=5.0"></script>
</body>
</html>
